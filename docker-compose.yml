# SwarLipi AI — Docker Compose (Full Development Stack)
# Usage: docker-compose up -d

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: swarlipi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: swarlipi
      POSTGRES_PASSWORD: swarlipi_pass
      POSTGRES_DB: swarlipi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarlipi -d swarlipi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: swarlipi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swarlipi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://swarlipi:swarlipi_pass@postgres:5432/swarlipi_db
      DATABASE_URL_SYNC: postgresql://swarlipi:swarlipi_pass@postgres:5432/swarlipi_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swarlipi-celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://swarlipi:swarlipi_pass@postgres:5432/swarlipi_db
      DATABASE_URL_SYNC: postgresql://swarlipi:swarlipi_pass@postgres:5432/swarlipi_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swarlipi-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  upload_data:
